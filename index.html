<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>MinhaBagg | Plataforma E-commerce</title>
    <meta name="description" content="Crie sua loja virtual em poucos minutos com a MinhaBagg. Pagamentos via Pix, catálogo inteligente, gestão de pedidos e integrações para vender online com eficiência." />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#ff6a00" />

    <!-- Canonical -->
    <link rel="canonical" href="https://minhabagg.com.br/" />

    <!-- Icons / Manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://minhabagg.com.br/" />
    <meta property="og:title" content="MinhaBagg | Crie sua loja virtual e venda mais" />
    <meta property="og:description" content="Crie sua loja virtual em poucos minutos. Pix, catálogo, pedidos e painel completo para você vender online com mais eficiência." />
    <meta property="og:image" content="https://i.imgur.com/YGlCXJU.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MinhaBagg | Crie sua loja virtual e venda mais" />
    <meta name="twitter:description" content="Crie sua loja virtual em poucos minutos. Pix, catálogo, pedidos e painel completo para você vender online com mais eficiência." />
    <meta name="twitter:image" content="https://i.imgur.com/YGlCXJU.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MinhaBagg",
        "url": "https://minhabagg.com.br/",
        "logo": "https://minhabagg.com.br/favicon.svg",
        "description": "Plataforma de e-commerce para criar loja virtual, vender com Pix e gerenciar pedidos com um painel completo."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
